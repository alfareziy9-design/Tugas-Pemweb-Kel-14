<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - LearnHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#14B8A6',
                        dark: '#1F2937',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: #f8f7ff;
            min-height: 100vh;
        }

        /* Decorative background blobs */
        .blob-1 {
            position: fixed;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79,70,229,0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .blob-2 {
            position: fixed;
            bottom: -80px;
            left: -80px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(20,184,166,0.10) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* Card entrance animation */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card-animate { animation: slideUp 0.5s ease both; }

        /* Input focus glow */
        .input-field {
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .input-field:focus {
            border-color: #4F46E5;
            box-shadow: 0 0 0 4px rgba(79,70,229,0.12);
            background: #fff;
            outline: none;
        }
        .input-field.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 4px rgba(239,68,68,0.10);
        }
        .input-field.success {
            border-color: #14B8A6;
            box-shadow: 0 0 0 4px rgba(20,184,166,0.10);
        }

        /* Input wrapper icon transition */
        .input-icon { transition: color 0.2s; }
        .input-field:focus ~ .input-icon { color: #4F46E5; }

        /* Button */
        .btn-primary {
            background: linear-gradient(135deg, #4F46E5 0%, #6366f1 100%);
            transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
            box-shadow: 0 4px 20px rgba(79,70,229,0.35);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(79,70,229,0.45);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Password toggle */
        .toggle-password { cursor: pointer; transition: color 0.2s; }
        .toggle-password:hover { color: #4F46E5; }

        /* Shake animation for error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-8px); }
            40%       { transform: translateX(8px); }
            60%       { transform: translateX(-5px); }
            80%       { transform: translateX(5px); }
        }
        .shake { animation: shake 0.4s ease; }

        /* Toast notification */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            transition: transform 0.35s cubic-bezier(.22,1,.36,1), opacity 0.35s;
            opacity: 0;
            z-index: 9999;
        }
        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Divider */
        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e5e7eb, transparent);
        }

        /* Loading spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }

        /* Label float effect */
        .floating-label {
            position: relative;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-700">

    <!-- Background blobs -->
    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <!-- Navbar -->
    <nav class="bg-white shadow-sm relative z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index2.html" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white font-bold text-sm">L</div>
                    <span class="font-bold text-xl text-dark">LearnHub</span>
                </a>
                <a href="index2.html" class="text-gray-500 hover:text-primary font-medium text-sm transition flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    Kembali ke Beranda
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="relative z-10 flex min-h-[calc(100vh-64px)] items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full card-animate">

            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-100 rounded-2xl mb-4">
                    <svg class="w-7 h-7 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </div>
                <h2 class="text-3xl font-extrabold text-dark">Selamat Datang!</h2>
                <p class="mt-2 text-sm text-gray-500">
                    Masuk untuk melanjutkan belajar
                </p>
            </div>

            <!-- Card -->
            <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">

                <!-- Alert error -->
                <div id="alert-error" class="hidden mb-5 p-3.5 bg-red-50 border border-red-200 rounded-xl flex items-center gap-3 text-sm text-red-600">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span id="alert-error-text"></span>
                </div>

                <form id="login-form" novalidate class="space-y-5">
                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">Alamat Email</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 input-icon pointer-events-none">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                </svg>
                            </span>
                            <input id="email" name="email" type="email" autocomplete="email"
                                class="input-field w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-sm text-gray-900 placeholder-gray-400"
                                placeholder="nama@email.com">
                        </div>
                        <p id="email-error" class="mt-1.5 text-xs text-red-500 hidden"></p>
                    </div>

                    <!-- Password -->
                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
                            <a href="#" class="text-xs text-primary hover:text-indigo-700 font-medium transition">Lupa password?</a>
                        </div>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 input-icon pointer-events-none">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                </svg>
                            </span>
                            <input id="password" name="password" type="password" autocomplete="current-password"
                                class="input-field w-full pl-10 pr-12 py-3 border border-gray-200 rounded-xl bg-gray-50 text-sm text-gray-900 placeholder-gray-400"
                                placeholder="Masukkan password">
                            <button type="button" class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-gray-400" onclick="togglePassword('password', 'eye-icon-1')">
                                <svg id="eye-icon-1" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                        <p id="password-error" class="mt-1.5 text-xs text-red-500 hidden"></p>
                    </div>

                    <!-- Remember me -->
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox"
                            class="h-4 w-4 text-primary border-gray-300 rounded accent-primary cursor-pointer">
                        <label for="remember-me" class="ml-2 text-sm text-gray-600 cursor-pointer select-none">Ingat saya selama 30 hari</label>
                    </div>

                    <!-- Submit -->
                    <button type="submit" id="submit-btn"
                        class="btn-primary w-full py-3 px-4 rounded-xl text-white font-bold text-sm flex items-center justify-center gap-2 mt-2">
                        <span id="btn-text">Masuk Sekarang</span>
                        <svg id="btn-arrow" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                        </svg>
                        <div id="btn-spinner" class="spinner hidden"></div>
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center gap-3 my-6">
                    <div class="divider-line"></div>
                    <span class="text-xs text-gray-400 font-medium">atau</span>
                    <div class="divider-line"></div>
                </div>

                <!-- Google login (UI only) -->
                <button onclick="handleGoogle()" class="w-full flex items-center justify-center gap-3 py-3 px-4 border border-gray-200 rounded-xl text-sm font-semibold text-gray-700 hover:bg-gray-50 hover:border-gray-300 transition">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Lanjutkan dengan Google
                </button>

                <!-- Sign up link -->
                <p class="text-center text-sm text-gray-500 mt-6">
                    Belum punya akun?
                    <a href="signup.html" class="font-bold text-primary hover:text-indigo-700 transition">Daftar gratis →</a>
                </p>
            </div>

            <!-- Trust badges -->
            <div class="flex items-center justify-center gap-6 mt-6 text-xs text-gray-400">
                <span class="flex items-center gap-1">
                    <svg class="w-3.5 h-3.5 text-secondary" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                    </svg>
                    SSL Terenkripsi
                </span>
                <span class="flex items-center gap-1">
                    <svg class="w-3.5 h-3.5 text-secondary" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                    </svg>
                    Data Aman
                </span>
                <span class="flex items-center gap-1">
                    <svg class="w-3.5 h-3.5 text-secondary" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                    Privasi Terjaga
                </span>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="relative z-10 bg-white border-t">
        <div class="max-w-7xl mx-auto py-4 px-4">
            <p class="text-center text-gray-400 text-xs">&copy; 2026 LearnHub. All rights reserved.</p>
        </div>
    </footer>

    <!-- Toast -->
    <div id="toast" class="bg-dark text-white text-sm font-medium px-5 py-3 rounded-xl shadow-2xl flex items-center gap-2">
        <svg class="w-4 h-4 text-secondary flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        <span id="toast-text"></span>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon  = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
            } else {
                input.type = 'password';
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
            }
        }

        // Show toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Input validation helpers
        function setError(inputId, errorId, msg) {
            const input = document.getElementById(inputId);
            const err   = document.getElementById(errorId);
            input.classList.add('error');
            input.classList.remove('success');
            err.textContent = msg;
            err.classList.remove('hidden');
        }
        function setSuccess(inputId, errorId) {
            const input = document.getElementById(inputId);
            const err   = document.getElementById(errorId);
            input.classList.remove('error');
            input.classList.add('success');
            err.classList.add('hidden');
        }
        function clearState(inputId, errorId) {
            const input = document.getElementById(inputId);
            const err   = document.getElementById(errorId);
            input.classList.remove('error','success');
            err.classList.add('hidden');
        }

        // Live validation
        document.getElementById('email').addEventListener('blur', function() {
            const val = this.value.trim();
            if (!val) { setError('email','email-error','Email tidak boleh kosong'); return; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) { setError('email','email-error','Format email tidak valid'); return; }
            setSuccess('email','email-error');
        });
        document.getElementById('email').addEventListener('input', function() {
            if (this.classList.contains('error')) clearState('email','email-error');
        });
        document.getElementById('password').addEventListener('blur', function() {
            if (!this.value) { setError('password','password-error','Password tidak boleh kosong'); return; }
            setSuccess('password','password-error');
        });
        document.getElementById('password').addEventListener('input', function() {
            if (this.classList.contains('error')) clearState('password','password-error');
        });

        // Form submit
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            let valid = true;

            // Hide previous alert
            document.getElementById('alert-error').classList.add('hidden');

            // Validate
            if (!email) { setError('email','email-error','Email tidak boleh kosong'); valid = false; }
            else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('email','email-error','Format email tidak valid'); valid = false; }
            else { setSuccess('email','email-error'); }

            if (!password) { setError('password','password-error','Password tidak boleh kosong'); valid = false; }
            else { setSuccess('password','password-error'); }

            if (!valid) {
                document.getElementById('login-form').classList.add('shake');
                setTimeout(() => document.getElementById('login-form').classList.remove('shake'), 400);
                return;
            }

            // Simulate loading
            const btn     = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnArrow= document.getElementById('btn-arrow');
            const spinner = document.getElementById('btn-spinner');
            btn.disabled = true;
            btnText.textContent = 'Memproses...';
            btnArrow.classList.add('hidden');
            spinner.classList.remove('hidden');

            setTimeout(() => {
                btn.disabled = false;
                btnText.textContent = 'Masuk Sekarang';
                btnArrow.classList.remove('hidden');
                spinner.classList.add('hidden');

                // Simulate wrong credentials for demo
                if (password.length < 6) {
                    const alert = document.getElementById('alert-error');
                    document.getElementById('alert-error-text').textContent = 'Email atau password salah. Silakan coba lagi.';
                    alert.classList.remove('hidden');
                    setError('password','password-error','Password tidak sesuai');
                    document.getElementById('login-form').classList.add('shake');
                    setTimeout(() => document.getElementById('login-form').classList.remove('shake'), 400);
                } else {
                    showToast('Login berhasil! Mengarahkan...');
                    setTimeout(() => {
                        window.location.href = 'index2.html';
                    }, 1500);
                }
            }, 1800);
        });

        // Google button (UI only)
        function handleGoogle() {
            showToast('Fitur Google Login segera hadir!');
        }
    </script>
</body>
</html>
